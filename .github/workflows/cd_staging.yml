name: Deploy to staging
on:
  push:
    branches:
      - main
jobs:
  redeploy_everything:
    name: Deploying everyhting to the  staging cluster
    runs-on: ubuntu-latest
    steps:
      - name: SSH to server
        run: >
          echo "${{ secrets.AWS_SECRET_ACCESS_KEY }}" > arpit.pem

          chmod 600 arpit.pem

          ssh  -i arpit.pem
          ubuntu@ec2-13-201-87-73.ap-south-1.compute.amazonaws.com

          cd devops-monorepo-ci-cd/ && git pull

          pnpm install

          pnpm run build

          pm2 start fe-server

          pm2 start ws-server

          pm2 start http-server
